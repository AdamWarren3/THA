name: Apply pending fixes
on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: AdamW3 closing line
        continue-on-error: true
        run: sed -i 's/for the full development of this concept/for the full framework/' index.html
      - name: Optimization Protocol trim
        continue-on-error: true
        run: |
          python3 << 'EOF'
          with open('index.html', encoding='utf-8') as f:
              t = f.read()
          old = '''    <p>Outcome data from active use is still being gathered. Results and validation findings are pending and will be added here as they become available.</p>
    <p>The theoretical basis is documented in <a onclick="showNote('hypnosis-protocol')" href="#">Hypnosis as Protocol</a>.</p>
    <p>See also: <a onclick="showNote('nlp2')" href="#">NLP²</a>, <a onclick="showNote('ai-scaffold')" href="#">AI as Cognitive Scaffold</a>, <a onclick="showNote('intentionality')" href="#">Intentionality Architecture</a></p>'''
          new = '''    <p>See also: <a onclick="showNote('hypnosis-protocol')" href="#">Hypnosis as Protocol</a>, <a onclick="showNote('nlp2')" href="#">NLP²</a>, <a onclick="showNote('ai-scaffold')" href="#">AI as Cognitive Scaffold</a>, <a onclick="showNote('intentionality')" href="#">Intentionality Architecture</a></p>'''
          if old in t:
              t = t.replace(old, new)
              print("Optimization Protocol: fixed")
          else:
              print("Optimization Protocol: pattern not found, skipped safely")
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(t)
          EOF
      - name: Delete duplicate ARCHITECTURE.md
        continue-on-error: true
        run: rm -f ARCHITECTURE.md
      - name: Commit
        run: |
          git config user.name "fix-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Apply pending fixes: AdamW3, Optimization Protocol, duplicate ARCHITECTURE.md"
          git pull --rebase origin main
          git push
