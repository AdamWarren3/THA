<?xml version="1.0" encoding="UTF-8"?>
<svg
xmlns="http://www.w3.org/2000/svg"
xmlns:xlink="http://www.w3.org/1999/xlink"
viewBox="0 0 1200 300"
width="1200"
height="300">

<defs>

<style><![CDATA[

svg{
background:transparent;
overflow:visible;
}

.edge{
fill:none;
stroke:#7b8794;
stroke-width:1.6;
stroke-linecap:round;
stroke-linejoin:round;
opacity:.18;
stroke-dasharray:200;
stroke-dashoffset:200;
animation:draw .8s ease forwards;
}

.edge.e1{animation-delay:.2s;}
.edge.e2{animation-delay:.35s;}
.edge.e3{animation-delay:.5s;}
.edge.e4{animation-delay:.65s;}
.edge.e5{animation-delay:.8s;}
.edge.e6{animation-delay:.95s;}
.edge.e7{animation-delay:1.1s;}
.edge.e8{animation-delay:1.25s;}
.edge.e9{animation-delay:1.4s;}
.edge.e10{animation-delay:1.55s;}
.edge.e11{animation-delay:1.7s;}
.edge.e12{animation-delay:1.85s;}
.edge.e13{animation-delay:2s;}
.edge.e14{animation-delay:2.15s;}
.edge.e15{animation-delay:2.3s;}
.edge.e16{animation-delay:2.45s;}
.edge.e17{animation-delay:2.6s;}
.edge.e18{animation-delay:2.75s;}

.node{
fill:#f8fafc;
opacity:0;
animation:appear .45s ease forwards;
}

.n1{animation-delay:.2s;}
.n2{animation-delay:.35s;}
.n3{animation-delay:.5s;}
.n4{animation-delay:.65s;}
.n5{animation-delay:.8s;}
.n6{animation-delay:.95s;}
.n7{animation-delay:1.1s;}
.n8{animation-delay:1.25s;}
.n9{animation-delay:1.4s;}
.n10{animation-delay:1.55s;}
.n11{animation-delay:1.7s;}
.n12{animation-delay:1.85s;}

#graph{
animation:breathe 14s ease-in-out infinite;
transform-origin:center;
}

.title{
font-family:Inter,Segoe UI,Arial,sans-serif;
font-size:32px;
font-weight:300;
letter-spacing:8px;
fill:#f8fafc;
opacity:0;
animation:title 2s ease forwards;
animation-delay:3s;
}

.subtitle{
font-family:Inter,Segoe UI,Arial,sans-serif;
font-size:13px;
letter-spacing:2px;
fill:#94a3b8;
opacity:0;
animation:title 2s ease forwards;
animation-delay:3.4s;
}

@keyframes draw{
to{
stroke-dashoffset:0;
opacity:.55;
}
}

@keyframes appear{
to{
opacity:1;
}
}

@keyframes breathe{

0%,100%{
transform:translateY(0px) scale(1);
}

50%{
transform:translateY(-1px) scale(1.004);
}

}

@keyframes title{
to{
opacity:1;
}
}

.particle{
fill:white;
opacity:.08;
}

]]></style>

<circle id="node" r="5"/>

<path id="pulsePath"
d="
M470 60
L560 60
L610 100
L610 170
L560 215
L470 215
L500 170
L430 170
L430 100
L470 60
"/>

</defs>

<!-- Ambient particles -->

<g id="background">

<circle class="particle" r="1.2">
<animate attributeName="cx" values="70;95;80;70" dur="18s" repeatCount="indefinite"/>
<animate attributeName="cy" values="60;45;80;60" dur="16s" repeatCount="indefinite"/>
</circle>

<circle class="particle" r="1.6">
<animate attributeName="cx" values="180;210;190;180" dur="21s" repeatCount="indefinite"/>
<animate attributeName="cy" values="240;220;250;240" dur="18s" repeatCount="indefinite"/>
</circle>

<circle class="particle" r="1.1">
<animate attributeName="cx" values="350;330;370;350" dur="22s" repeatCount="indefinite"/>
<animate attributeName="cy" values="90;120;100;90" dur="20s" repeatCount="indefinite"/>
</circle>

<circle class="particle" r="1.4">
<animate attributeName="cx" values="820;860;845;820" dur="19s" repeatCount="indefinite"/>
<animate attributeName="cy" values="70;90;60;70" dur="17s" repeatCount="indefinite"/>
</circle>

<circle class="particle" r="1.3">
<animate attributeName="cx" values="1080;1040;1095;1080" dur="24s" repeatCount="indefinite"/>
<animate attributeName="cy" values="230;215;245;230" dur="20s" repeatCount="indefinite"/>
</circle>

</g>

<g id="graph">

<!-- edges -->

<path class="edge e1" d="M470 60 L560 60"/>
<path class="edge e2" d="M470 60 L430 100"/>
<path class="edge e3" d="M560 60 L610 100"/>
<path class="edge e4" d="M430 100 L510 100"/>
<path class="edge e5" d="M510 100 L610 100"/>
<path class="edge e6" d="M430 100 L430 170"/>
<path class="edge e7" d="M510 100 L510 170"/>
<path class="edge e8" d="M610 100 L610 170"/>
<path class="edge e9" d="M430 170 L500 170"/>
<path class="edge e10" d="M500 170 L600 170"/>
<path class="edge e11" d="M600 170 L640 170"/>
<path class="edge e12" d="M500 170 L470 215"/>
<path class="edge e13" d="M600 170 L560 215"/>
<path class="edge e14" d="M470 215 L560 215"/>
<path class="edge e15" d="M515 215 L515 255"/>
<path class="edge e16" d="M430 100 L500 170"/>
<path class="edge e17" d="M510 100 L600 170"/>
<path class="edge e18" d="M610 100 L500 170"/>

<!-- nodes -->

<use href="#node" class="node n1" x="470" y="60"/>
<use href="#node" class="node n2" x="560" y="60"/>
<use href="#node" class="node n3" x="430" y="100"/>
<use href="#node" class="node n4" x="510" y="100"/>
<use href="#node" class="node n5" x="610" y="100"/>
<use href="#node" class="node n6" x="430" y="170"/>
<use href="#node" class="node n7" x="500" y="170"/>
<use href="#node" class="node n8" x="600" y="170"/>
<use href="#node" class="node n9" x="640" y="170"/>
<use href="#node" class="node n10" x="470" y="215"/>
<use href="#node" class="node n11" x="560" y="215"/>
<use href="#node" class="node n12" x="515" y="255"/>

<!-- pulse -->

<circle r="3" fill="#7dd3fc">

<animateMotion
dur="9s"
repeatCount="indefinite"
rotate="auto">

<mpath href="#pulsePath"/>

</animateMotion>

</circle>

</g>

<text
class="title"
x="720"
y="138">

THE HUMAN ALGORITHM

</text>

<text
class="subtitle"
x="720"
y="165">

A framework for deliberate human optimization

</text>

<!-- subtle node glow -->

<g opacity=".18">

<circle cx="470" cy="60" r="10" fill="#7dd3fc">
<animate attributeName="opacity"
values=".05;.30;.05"
dur="9s"
repeatCount="indefinite"/>
</circle>

<circle cx="560" cy="60" r="10" fill="#7dd3fc">
<animate attributeName="opacity"
values=".05;.25;.05"
begin="1s"
dur="9s"
repeatCount="indefinite"/>
</circle>

<circle cx="610" cy="100" r="10" fill="#7dd3fc">
<animate attributeName="opacity"
values=".05;.28;.05"
begin="2s"
dur="9s"
repeatCount="indefinite"/>
</circle>

<circle cx="600" cy="170" r="10" fill="#7dd3fc">
<animate attributeName="opacity"
values=".05;.30;.05"
begin="3s"
dur="9s"
repeatCount="indefinite"/>
</circle>

<circle cx="560" cy="215" r="10" fill="#7dd3fc">
<animate attributeName="opacity"
values=".05;.25;.05"
begin="4s"
dur="9s"
repeatCount="indefinite"/>
</circle>

<circle cx="470" cy="215" r="10" fill="#7dd3fc">
<animate attributeName="opacity"
values=".05;.28;.05"
begin="5s"
dur="9s"
repeatCount="indefinite"/>
</circle>

<circle cx="500" cy="170" r="10" fill="#7dd3fc">
<animate attributeName="opacity"
values=".05;.30;.05"
begin="6s"
dur="9s"
repeatCount="indefinite"/>
</circle>

<circle cx="430" cy="170" r="10" fill="#7dd3fc">
<animate attributeName="opacity"
values=".05;.25;.05"
begin="7s"
dur="9s"
repeatCount="indefinite"/>
</circle>

<circle cx="430" cy="100" r="10" fill="#7dd3fc">
<animate attributeName="opacity"
values=".05;.30;.05"
begin="8s"
dur="9s"
repeatCount="indefinite"/>
</circle>

</g>

<!-- extra ambient particles -->

<g>

<circle class="particle" r="1">
<animate attributeName="cx" values="40;120;40" dur="23s" repeatCount="indefinite"/>
<animate attributeName="cy" values="150;180;150" dur="19s" repeatCount="indefinite"/>
</circle>

<circle class="particle" r="1.3">
<animate attributeName="cx" values="920;980;920" dur="20s" repeatCount="indefinite"/>
<animate attributeName="cy" values="210;170;210" dur="18s" repeatCount="indefinite"/>
</circle>

<circle class="particle" r="1.1">
<animate attributeName="cx" values="1120;1080;1120" dur="17s" repeatCount="indefinite"/>
<animate attributeName="cy" values="90;70;90" dur="21s" repeatCount="indefinite"/>
</circle>

<circle class="particle" r="1.2">
<animate attributeName="cx" values="640;680;640" dur="26s" repeatCount="indefinite"/>
<animate attributeName="cy" values="35;60;35" dur="20s" repeatCount="indefinite"/>
</circle>

<circle class="particle" r="1.5">
<animate attributeName="cx" values="1030;1010;1030" dur="24s" repeatCount="indefinite"/>
<animate attributeName="cy" values="260;230;260" dur="22s" repeatCount="indefinite"/>
</circle>

</g>

</svg>
