<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="420" viewBox="0 0 1600 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .edge {
      stroke: #d0d0d0;
      stroke-width: 1.35;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 420;
      stroke-dashoffset: 420;
      animation: draw 0.92s cubic-bezier(0.38, 0.0, 0.22, 1) forwards;
    }
    .node {
      fill: #f8f8f8;
      opacity: 0;
      animation: appear 0.55s ease-out forwards;
    }
    #graph {
      transform-origin: 335px 192px;
      animation: breathe 8.2s ease-in-out infinite;
    }
    .title-text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: #2a2a2a;
      opacity: 0;
      animation: fadeInTitle 0.85s ease-out forwards;
    }
    .subtitle-text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: #5f5f5f;
      opacity: 0;
      animation: fadeInTitle 0.85s ease-out forwards;
    }
    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }
    @keyframes appear {
      to {
        opacity: 1;
      }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.0105); }
    }
    @keyframes fadeInTitle {
      to {
        opacity: 1;
      }
    }
  </style>

  <!-- Graph -->
  <g id="graph">
    <!-- Edges (connections) - staggered draw animation -->
    <!-- Top row -->
    <line x1="125" y1="85" x2="255" y2="68" class="edge" style="animation-delay: 0.12s"/>
    <line x1="255" y1="68" x2="395" y2="92" class="edge" style="animation-delay: 0.25s"/>
    <line x1="395" y1="92" x2="525" y2="72" class="edge" style="animation-delay: 0.38s"/>

    <!-- Inter-layer connections -->
    <line x1="125" y1="85" x2="155" y2="175" class="edge" style="animation-delay: 0.18s"/>
    <line x1="255" y1="68" x2="305" y2="158" class="edge" style="animation-delay: 0.32s"/>
    <line x1="395" y1="92" x2="445" y2="185" class="edge" style="animation-delay: 0.45s"/>
    <line x1="525" y1="72" x2="565" y2="168" class="edge" style="animation-delay: 0.52s"/>

    <!-- Mid connections -->
    <line x1="155" y1="175" x2="305" y2="158" class="edge" style="animation-delay: 0.62s"/>
    <line x1="305" y1="158" x2="445" y2="185" class="edge" style="animation-delay: 0.75s"/>
    <line x1="445" y1="185" x2="565" y2="168" class="edge" style="animation-delay: 0.82s"/>

    <!-- Lower connections -->
    <line x1="155" y1="175" x2="135" y2="295" class="edge" style="animation-delay: 0.92s"/>
    <line x1="305" y1="158" x2="285" y2="318" class="edge" style="animation-delay: 1.02s"/>
    <line x1="445" y1="185" x2="435" y2="302" class="edge" style="animation-delay: 1.08s"/>
    <line x1="565" y1="168" x2="555" y2="328" class="edge" style="animation-delay: 1.15s"/>

    <!-- Bottom row -->
    <line x1="135" y1="295" x2="285" y2="318" class="edge" style="animation-delay: 1.25s"/>
    <line x1="285" y1="318" x2="435" y2="302" class="edge" style="animation-delay: 1.32s"/>
    <line x1="435" y1="302" x2="555" y2="328" class="edge" style="animation-delay: 1.38s"/>

    <!-- Additional cross / diagonal connections for 3D network feel -->
    <line x1="125" y1="85" x2="305" y2="158" class="edge" style="animation-delay: 0.28s"/>
    <line x1="255" y1="68" x2="445" y2="185" class="edge" style="animation-delay: 0.48s"/>
    <line x1="395" y1="92" x2="565" y2="168" class="edge" style="animation-delay: 0.58s"/>
    <line x1="155" y1="175" x2="285" y2="318" class="edge" style="animation-delay: 0.85s"/>
    <line x1="305" y1="158" x2="435" y2="302" class="edge" style="animation-delay: 0.98s"/>
    <line x1="445" y1="185" x2="555" y2="328" class="edge" style="animation-delay: 1.12s"/>
    <line x1="255" y1="68" x2="155" y2="175" class="edge" style="animation-delay: 0.40s"/>
    <line x1="445" y1="185" x2="525" y2="72" class="edge" style="animation-delay: 0.68s"/>
    <line x1="305" y1="158" x2="525" y2="72" class="edge" style="animation-delay: 0.78s"/>
    <line x1="135" y1="295" x2="305" y2="158" class="edge" style="animation-delay: 1.05s"/>

    <!-- Nodes (12 total) - soft white, subtle depth via slight radius variation -->
    <!-- Node 1 -->
    <circle cx="125" cy="85" r="5.7" class="node" style="animation-delay: 0.65s"/>
    <!-- Node 2 -->
    <circle cx="255" cy="68" r="5.4" class="node" style="animation-delay: 0.78s"/>
    <!-- Node 3 -->
    <circle cx="395" cy="92" r="5.6" class="node" style="animation-delay: 0.88s"/>
    <!-- Node 4 -->
    <circle cx="525" cy="72" r="5.3" class="node" style="animation-delay: 1.02s"/>
    <!-- Node 5 -->
    <circle cx="155" cy="175" r="5.9" class="node" style="animation-delay: 0.82s"/>
    <!-- Node 6 -->
    <circle cx="305" cy="158" r="5.5" class="node" style="animation-delay: 0.95s"/>
    <!-- Node 7 -->
    <circle cx="445" cy="185" r="5.8" class="node" style="animation-delay: 1.05s"/>
    <!-- Node 8 -->
    <circle cx="565" cy="168" r="5.4" class="node" style="animation-delay: 1.10s"/>
    <!-- Node 9 -->
    <circle cx="135" cy="295" r="5.5" class="node" style="animation-delay: 1.18s"/>
    <!-- Node 10 -->
    <circle cx="285" cy="318" r="5.7" class="node" style="animation-delay: 1.28s"/>
    <!-- Node 11 -->
    <circle cx="435" cy="302" r="5.4" class="node" style="animation-delay: 1.35s"/>
    <!-- Node 12 -->
    <circle cx="555" cy="328" r="5.6" class="node" style="animation-delay: 1.42s"/>
  </g>

  <!-- Traveling muted blue pulse (subtle dot moving along a cycle through the graph) -->
  <!-- Guide path (invisible, used only for motion) -->
  <path id="pulse-route" d="M135,295 L155,175 L125,85 L255,68 L395,92 L525,72 L565,168 L555,328 L435,302 L445,185 L305,158 L285,318 L135,295" fill="none" stroke="none"/>

  <!-- The pulse element -->
  <circle r="2.9" fill="#5d93c4" opacity="0.58">
    <animateMotion 
      dur="6.6s" 
      repeatCount="indefinite" 
      begin="3.1s"
      calcMode="linear"
      keyPoints="0;1"
      keyTimes="0;1">
      <mpath href="#pulse-route"/>
    </animateMotion>
  </circle>

  <!-- Title block (right side, generous spacing from graph) -->
  <text 
    x="820" 
    y="152" 
    font-size="39" 
    font-weight="400" 
    letter-spacing="-0.6"
    class="title-text" 
    style="animation-delay: 2.15s;">
    THE HUMAN ALGORITHM
  </text>

  <text 
    x="820" 
    y="192" 
    font-size="16.5" 
    font-weight="400" 
    class="subtitle-text" 
    style="animation-delay: 2.45s;">
    A framework for deliberate human optimization.
  </text>

</svg>