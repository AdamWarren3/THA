<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.3; r: 4; }
        50% { opacity: 1; r: 6; }
      }
      @keyframes pulse2 {
        0%, 100% { opacity: 0.2; r: 3; }
        50% { opacity: 0.8; r: 5; }
      }
      @keyframes pulse3 {
        0%, 100% { opacity: 0.5; r: 5; }
        50% { opacity: 1; r: 7; }
      }
      @keyframes linefade {
        0%, 100% { opacity: 0.1; }
        50% { opacity: 0.4; }
      }
      @keyframes linefade2 {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.6; }
      }
      @keyframes blink {
        0%, 90%, 100% { opacity: 1; }
        95% { opacity: 0; }
      }
      @keyframes typeout {
        from { clip-path: inset(0 100% 0 0); }
        to { clip-path: inset(0 0% 0 0); }
      }
      @keyframes floatup {
        0% { transform: translateY(0px); opacity: 0.6; }
        50% { transform: translateY(-8px); opacity: 1; }
        100% { transform: translateY(0px); opacity: 0.6; }
      }
      @keyframes optimizing {
        0% { stroke: #2b6cb0; opacity: 0.3; }
        50% { stroke: #63b3ed; opacity: 0.8; }
        100% { stroke: #2b6cb0; opacity: 0.3; }
      }

      .node-main { animation: pulse3 3s ease-in-out infinite; }
      .node-a { animation: pulse 2.3s ease-in-out infinite; }
      .node-b { animation: pulse2 3.7s ease-in-out infinite 0.5s; }
      .node-c { animation: pulse 2.8s ease-in-out infinite 1s; }
      .node-d { animation: pulse2 4.1s ease-in-out infinite 0.3s; }
      .node-e { animation: pulse 3.2s ease-in-out infinite 0.8s; }
      .node-f { animation: pulse2 2.6s ease-in-out infinite 1.2s; }
      .node-g { animation: pulse 3.9s ease-in-out infinite 0.2s; }
      .node-h { animation: pulse2 2.4s ease-in-out infinite 0.7s; }

      .line-a { animation: linefade 3.1s ease-in-out infinite; }
      .line-b { animation: linefade2 2.7s ease-in-out infinite 0.4s; }
      .line-c { animation: linefade 3.8s ease-in-out infinite 0.9s; }
      .line-d { animation: linefade2 2.5s ease-in-out infinite 1.1s; }
      .line-e { animation: linefade 4.2s ease-in-out infinite 0.6s; }
      .line-f { animation: linefade2 3.3s ease-in-out infinite 0.3s; }
      .line-g { animation: linefade 2.9s ease-in-out infinite 1.4s; }
      .line-h { animation: optimizing 3.5s ease-in-out infinite; }

      .cursor { animation: blink 1.2s step-end infinite; }
      .float { animation: floatup 4s ease-in-out infinite; }
      .float2 { animation: floatup 5s ease-in-out infinite 1s; }
      .float3 { animation: floatup 3.5s ease-in-out infinite 2s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#0f1923"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#2b6cb0" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
    <line x1="1100" y1="0" x2="1100" y2="300"/>
  </g>

  <!-- LEFT NODE NETWORK -->
  <!-- Connection lines -->
  <line class="line-a" x1="150" y1="150" x2="80" y2="90" stroke="#2b6cb0" stroke-width="1"/>
  <line class="line-b" x1="150" y1="150" x2="220" y2="80" stroke="#2b6cb0" stroke-width="1"/>
  <line class="line-c" x1="150" y1="150" x2="240" y2="160" stroke="#2b6cb0" stroke-width="1"/>
  <line class="line-d" x1="150" y1="150" x2="180" y2="230" stroke="#2b6cb0" stroke-width="1"/>
  <line class="line-e" x1="150" y1="150" x2="70" y2="200" stroke="#2b6cb0" stroke-width="1"/>
  <line class="line-f" x1="80" y1="90" x2="220" y2="80" stroke="#2b6cb0" stroke-width="0.5"/>
  <line class="line-g" x1="220" y1="80" x2="240" y2="160" stroke="#2b6cb0" stroke-width="0.5"/>
  <line class="line-h" x1="70" y1="200" x2="180" y2="230" stroke="#63b3ed" stroke-width="1"/>

  <!-- Outer nodes -->
  <circle class="node-a" cx="80" cy="90" r="4" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>
  <circle class="node-b" cx="220" cy="80" r="3" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>
  <circle class="node-c" cx="240" cy="160" r="4" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>
  <circle class="node-d" cx="180" cy="230" r="3" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>
  <circle class="node-e" cx="70" cy="200" r="4" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>

  <!-- Secondary connections -->
  <line class="line-a" x1="80" y1="90" x2="50" y2="140" stroke="#2b6cb0" stroke-width="0.5"/>
  <line class="line-b" x1="240" y1="160" x2="280" y2="210" stroke="#2b6cb0" stroke-width="0.5"/>
  <circle class="node-f" cx="50" cy="140" r="2" fill="none" stroke="#2b6cb0" stroke-width="1"/>
  <circle class="node-g" cx="280" cy="210" r="2" fill="none" stroke="#2b6cb0" stroke-width="1"/>

  <!-- Central optimized node -->
  <circle cx="150" cy="150" r="10" fill="#0f1923" stroke="#63b3ed" stroke-width="1.5" opacity="0.6"/>
  <circle class="node-main" cx="150" cy="150" r="5" fill="#2b6cb0"/>

  <!-- RIGHT NODE NETWORK -->
  <line class="line-c" x1="1050" y1="150" x2="980" y2="90" stroke="#2b6cb0" stroke-width="1"/>
  <line class="line-d" x1="1050" y1="150" x2="1120" y2="80" stroke="#2b6cb0" stroke-width="1"/>
  <line class="line-e" x1="1050" y1="150" x2="1130" y2="160" stroke="#2b6cb0" stroke-width="1"/>
  <line class="line-f" x1="1050" y1="150" x2="1080" y2="230" stroke="#2b6cb0" stroke-width="1"/>
  <line class="line-g" x1="1050" y1="150" x2="970" y2="200" stroke="#2b6cb0" stroke-width="1"/>
  <line class="line-h" x1="970" y1="200" x2="1080" y2="230" stroke="#63b3ed" stroke-width="1"/>

  <circle class="node-b" cx="980" cy="90" r="4" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>
  <circle class="node-c" cx="1120" cy="80" r="3" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>
  <circle class="node-d" cx="1130" cy="160" r="4" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>
  <circle class="node-e" cx="1080" cy="230" r="3" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>
  <circle class="node-a" cx="970" cy="200" r="4" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>

  <line class="line-a" x1="1130" y1="160" x2="1160" y2="210" stroke="#2b6cb0" stroke-width="0.5"/>
  <circle class="node-h" cx="1160" cy="210" r="2" fill="none" stroke="#2b6cb0" stroke-width="1"/>

  <circle cx="1050" cy="150" r="10" fill="#0f1923" stroke="#63b3ed" stroke-width="1.5" opacity="0.6"/>
  <circle class="node-main" cx="1050" cy="150" r="5" fill="#2b6cb0"/>

  <!-- CENTER TEXT BLOCK -->
  <!-- THA monogram -->
  <text x="600" y="108" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="8">THA</text>

  <!-- Subtitle -->
  <text x="600" y="145" font-family="'Courier New', Courier, monospace" font-size="11" fill="#2b6cb0" text-anchor="middle" letter-spacing="4">THE HUMAN ALGORITHM</text>

  <!-- Divider line -->
  <line x1="460" y1="158" x2="740" y2="158" stroke="#2b6cb0" stroke-width="0.5" opacity="0.4"/>

  <!-- Terminal lines -->
  <text class="float" x="600" y="182" font-family="'Courier New', Courier, monospace" font-size="9" fill="#2b6cb0" text-anchor="middle" letter-spacing="2" opacity="0.7">
    &gt; OPTIMIZING NODE :: SIGNAL / NOISE
  </text>
  <text class="float2" x="600" y="200" font-family="'Courier New', Courier, monospace" font-size="9" fill="#2b6cb0" text-anchor="middle" letter-spacing="2" opacity="0.5">
    &gt; NLP² :: MEMNETIC :: EPISTEMIC_HYGIENE
  </text>
  <text class="float3" x="600" y="218" font-family="'Courier New', Courier, monospace" font-size="9" fill="#63b3ed" text-anchor="middle" letter-spacing="2" opacity="0.6">
    &gt; THE OPTIMIZER BECOMES THE OPTIMIZED
  </text>

  <!-- Cursor -->
  <text class="cursor" x="736" y="218" font-family="'Courier New', Courier, monospace" font-size="9" fill="#63b3ed" opacity="0.8">_</text>

  <!-- Version tag -->
  <text x="600" y="256" font-family="'Courier New', Courier, monospace" font-size="8" fill="#2b6cb0" text-anchor="middle" letter-spacing="3" opacity="0.4">v0.1 // ACTIVE DEVELOPMENT // OPEN SOURCE OPTIMIZATION</text>

  <!-- Subtle corner accents -->
  <path d="M 20 20 L 20 45 M 20 20 L 45 20" stroke="#2b6cb0" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M 1180 20 L 1180 45 M 1180 20 L 1155 20" stroke="#2b6cb0" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M 20 280 L 20 255 M 20 280 L 45 280" stroke="#2b6cb0" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M 1180 280 L 1180 255 M 1180 280 L 1155 280" stroke="#2b6cb0" stroke-width="1" opacity="0.3" fill="none"/>
</svg>
